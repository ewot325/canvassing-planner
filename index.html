<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Canvassing Planner — Locations Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- ============ LEFT BLOCK: LOCATIONS ============ -->
    <aside id="panel-left" class="panel">
      <header class="panel-header">
        <h1>Canvassing Planner</h1>
        <p id="subtitle">Where the team has been &amp; where to go next.</p>
      </header>

      <div class="summary" id="summary"><!-- filled by app.js --></div>

      <div class="controls">
        <label class="field">
          <span class="field-label">Color the districts by</span>
          <select id="shading-mode">
            <option value="opportunity">Priority for next week</option>
            <option value="boreslasher">2026 Dem Primary Results</option>
            <option value="mayor2025">2025 Mayor — Mamdani vs Cuomo</option>
            <option value="turnout">2025 Dem turnout</option>
            <option value="coverage">Canvassing coverage so far</option>
            <option value="none">No shading</option>
          </select>
        </label>

        <div class="field">
          <span class="field-label">Show on the map</span>
          <div class="layer-toggles">
            <label class="toggle"><input type="checkbox" id="lyr-sites" checked /> Canvassing sites</label>
            <label class="toggle"><input type="checkbox" id="lyr-hoods" /> Neighborhoods</label>
            <label class="toggle"><input type="checkbox" id="lyr-subway" /> Subway stops</label>
            <label class="toggle"><input type="checkbox" id="lyr-polls" /> Priority Election Day poll sites</label>
            <label class="toggle"><input type="checkbox" id="lyr-early" /> Early voting sites</label>
            <label class="toggle"><input type="checkbox" id="lyr-groc" /> Supermarkets</label>
          </div>
        </div>

        <input type="search" id="search" placeholder="Search a past site…" autocomplete="off" />
        <label class="field inline">
          <span class="field-label">Sort by</span>
          <select id="sort">
            <option value="opportunity">Most worth revisiting</option>
            <option value="recency">Longest since canvassed</option>
            <option value="weighted_person_days">Canvassing coverage</option>
            <option value="raw_person_days">Total person-days</option>
            <option value="unique_people_count">Unique volunteers</option>
            <option value="location_aliases">Name (A–Z)</option>
          </select>
        </label>
      </div>

      <ul id="location-list" class="location-list"><!-- filled by app.js --></ul>
      <footer class="panel-footer"><span id="count-line"></span></footer>
    </aside>

    <!-- ============ CENTER: MAP ============ -->
    <main id="map"></main>

    <!-- ============ RIGHT BLOCK: PLAN THE WEEK ============ -->
    <aside id="panel-right" class="panel">
      <header class="panel-header">
        <h2>Plan the week</h2>
        <p class="panel-sub">Assign election districts to each shift.</p>
      </header>
      <div class="week-nav">
        <button id="week-prev" title="Previous week">‹</button>
        <div class="week-label" id="week-label"></div>
        <button id="week-next" title="Next week">›</button>
      </div>
      <div class="shift-banner" id="shift-banner"></div>
      <p class="plan-hint">
        Pick a <strong>shift</strong> below, then <strong>click an election district on the map</strong>
        and choose <em>Add to shift</em> in its popup.
      </p>
      <div class="plan-days" id="plan-days"><!-- filled by app.js --></div>
      <div class="plan-actions">
        <button id="plan-print">🖨 Print / Save PDF</button>
        <button id="plan-copy">📋 Copy as text</button>
        <button id="plan-clear" class="danger">Clear this week</button>
      </div>
      <div class="plan-copied" id="plan-copied"></div>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
