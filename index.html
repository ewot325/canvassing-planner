<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Past Canvassing Locations — Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header id="sidebar-header">
        <h1>Past Canvassing Locations</h1>
        <p id="subtitle">Every site the team has canvassed.</p>
      </header>

      <section id="summary" class="summary">
        <!-- filled by app.js -->
      </section>

      <div class="controls">
        <input type="search" id="search" placeholder="Search a location…" autocomplete="off" />
        <label class="sort-row">
          Sort by
          <select id="sort">
            <option value="weighted_person_days">Canvassing coverage</option>
            <option value="raw_person_days">Total person-days</option>
            <option value="unique_people_count">Unique volunteers</option>
            <option value="days_active">Days active</option>
            <option value="location_aliases">Name (A–Z)</option>
          </select>
        </label>
        <label class="toggle-row">
          <input type="checkbox" id="toggle-districts" />
          Shade districts by 2025 Dem turnout
        </label>
      </div>

      <ul id="location-list" class="location-list">
        <!-- filled by app.js -->
      </ul>

      <footer id="sidebar-footer">
        <span id="count-line"></span>
      </footer>
    </aside>

    <main id="map"></main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
